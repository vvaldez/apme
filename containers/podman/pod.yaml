# Podman pod: Primary, Native, OPA, Ansible, Cache maintainer.
# All validators implement the unified Validator gRPC service (validate.proto).
# CLI is run on-the-fly with: ./run-cli.sh [args]
# Start from repo root: podman play kube pod.yaml
# Requires: images built first (./build.sh) and cache paths (defaults below).
apiVersion: v1
kind: Pod
metadata:
  name: apme-pod
  labels:
    app: apme
spec:
  hostname: apme-pod
  containers:
    - name: primary
      image: apme-primary:latest
      env:
        - name: APME_PRIMARY_LISTEN
          value: "0.0.0.0:50051"
        - name: NATIVE_GRPC_ADDRESS
          value: "127.0.0.1:50055"
        - name: OPA_GRPC_ADDRESS
          value: "127.0.0.1:50054"
        - name: ANSIBLE_GRPC_ADDRESS
          value: "127.0.0.1:50053"
        - name: GITLEAKS_GRPC_ADDRESS
          value: "127.0.0.1:50056"
      ports:
        - containerPort: 50051
          hostPort: 50051
    - name: native
      image: apme-native:latest
      env:
        - name: APME_NATIVE_VALIDATOR_LISTEN
          value: "0.0.0.0:50055"
      ports:
        - containerPort: 50055
          hostPort: 50055
    - name: opa
      image: apme-opa:latest
      env:
        - name: APME_OPA_VALIDATOR_LISTEN
          value: "0.0.0.0:50054"
      ports:
        - containerPort: 50054
          hostPort: 50054
    - name: ansible
      image: apme-ansible:latest
      env:
        - name: APME_ANSIBLE_VALIDATOR_LISTEN
          value: "0.0.0.0:50053"
        - name: APME_CACHE_ROOT
          value: "/cache"
      ports:
        - containerPort: 50053
          hostPort: 50053
      volumeMounts:
        - name: cache
          mountPath: /cache
          readOnly: true
    - name: gitleaks
      image: apme-gitleaks:latest
      env:
        - name: APME_GITLEAKS_VALIDATOR_LISTEN
          value: "0.0.0.0:50056"
      ports:
        - containerPort: 50056
          hostPort: 50056
    - name: cache-maintainer
      image: apme-cache-maintainer:latest
      env:
        - name: APME_CACHE_MAINTAINER_LISTEN
          value: "0.0.0.0:50052"
        - name: APME_CACHE_ROOT
          value: "/cache"
      ports:
        - containerPort: 50052
          hostPort: 50052
      volumeMounts:
        - name: cache
          mountPath: /cache
  volumes:
    - name: cache
      hostPath:
        # Replaced by up.sh with APME_CACHE_HOST_PATH or XDG cache default
        path: __APME_CACHE_PATH__
        type: DirectoryOrCreate
