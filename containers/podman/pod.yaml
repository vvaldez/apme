# Podman pod: Primary, Native, OPA, Ansible, Gitleaks, Galaxy Proxy.
# All validators implement the unified Validator gRPC service (validate.proto).
# Galaxy Proxy serves collections as Python wheels via PEP 503 (ADR-031).
# Session venvs are built by Primary (read-write) and shared with validators
# (read-only) via the sessions volume.
# CLI is run on-the-fly with: ./run-cli.sh [args]
# Start from repo root: podman play kube pod.yaml
# Requires: images built first (./build.sh) and cache paths (defaults below).
apiVersion: v1
kind: Pod
metadata:
  name: apme-pod
  labels:
    app: apme
spec:
  hostname: apme-pod
  containers:
    - name: primary
      image: apme-primary:latest
      env:
        - name: APME_PRIMARY_LISTEN
          value: "0.0.0.0:50051"
        - name: NATIVE_GRPC_ADDRESS
          value: "127.0.0.1:50055"
        - name: OPA_GRPC_ADDRESS
          value: "127.0.0.1:50054"
        - name: ANSIBLE_GRPC_ADDRESS
          value: "127.0.0.1:50053"
        - name: GITLEAKS_GRPC_ADDRESS
          value: "127.0.0.1:50056"
        - name: APME_GALAXY_PROXY_URL
          value: "http://127.0.0.1:8765"
        - name: APME_REPORTING_ENDPOINT
          value: "127.0.0.1:50060"
        - name: APME_ABBENAY_ADDR
          value: "127.0.0.1:50057"
        - name: APME_ABBENAY_TOKEN
          value: "apme-dev-token"
        - name: APME_AI_MODEL
          value: "${APME_AI_MODEL}"
      ports:
        - containerPort: 50051
          hostPort: 50051
      volumeMounts:
        - name: sessions
          mountPath: /sessions
    - name: native
      image: apme-native:latest
      env:
        - name: APME_NATIVE_VALIDATOR_LISTEN
          value: "0.0.0.0:50055"
      ports:
        - containerPort: 50055
          hostPort: 50055
    - name: opa
      image: apme-opa:latest
      env:
        - name: APME_OPA_VALIDATOR_LISTEN
          value: "0.0.0.0:50054"
      ports:
        - containerPort: 50054
          hostPort: 50054
    - name: ansible
      image: apme-ansible:latest
      env:
        - name: APME_ANSIBLE_VALIDATOR_LISTEN
          value: "0.0.0.0:50053"
        - name: APME_GALAXY_PROXY_URL
          value: "http://127.0.0.1:8765"
      ports:
        - containerPort: 50053
          hostPort: 50053
      volumeMounts:
        - name: sessions
          mountPath: /sessions
          readOnly: true
    - name: gitleaks
      image: apme-gitleaks:latest
      env:
        - name: APME_GITLEAKS_VALIDATOR_LISTEN
          value: "0.0.0.0:50056"
      ports:
        - containerPort: 50056
          hostPort: 50056
    - name: gateway
      image: apme-gateway:latest
      env:
        - name: APME_DB_PATH
          value: "/data/apme.db"
        - name: APME_GATEWAY_GRPC_LISTEN
          value: "0.0.0.0:50060"
        - name: APME_GATEWAY_HTTP_HOST
          value: "0.0.0.0"
        - name: APME_GATEWAY_HTTP_PORT
          value: "8080"
        - name: APME_FEEDBACK_ENABLED
          value: "${APME_FEEDBACK_ENABLED}"
        - name: APME_FEEDBACK_GITHUB_REPO
          value: "${APME_FEEDBACK_GITHUB_REPO}"
        - name: APME_FEEDBACK_GITHUB_TOKEN
          value: "${APME_FEEDBACK_GITHUB_TOKEN}"
      ports:
        - containerPort: 50060
          hostPort: 50060
        - containerPort: 8080
          hostPort: 8080
      volumeMounts:
        - name: gateway-data
          mountPath: /data
    - name: ui
      image: apme-ui:latest
      ports:
        - containerPort: 8081
          hostPort: 8081
    - name: abbenay
      image: ghcr.io/redhat-developer/abbenay:2026.4.1-alpha
      args: ["daemon", "--grpc-host", "0.0.0.0", "--grpc-port", "50057"]
      env:
        - name: OPENROUTER_API_KEY
          value: "${OPENROUTER_API_KEY}"
        - name: VERTEX_ANTHROPIC_API_KEY
          value: "${VERTEX_ANTHROPIC_API_KEY}"
        - name: APME_ABBENAY_TOKEN
          value: "apme-dev-token"
        - name: XDG_RUNTIME_DIR
          value: "/tmp/abbenay-run"
      ports:
        - containerPort: 50057
          hostPort: 50057
      volumeMounts:
        - name: abbenay-config
          mountPath: /home/abbenay/.config/abbenay/config.yaml
          readOnly: true
    - name: galaxy-proxy
      image: apme-galaxy-proxy:latest
      ports:
        - containerPort: 8765
          hostPort: 8765
      volumeMounts:
        - name: proxy-cache
          mountPath: /cache
  volumes:
    - name: gateway-data
      hostPath:
        path: __APME_CACHE_PATH__/gateway
        type: DirectoryOrCreate
    - name: sessions
      hostPath:
        path: __APME_CACHE_PATH__/sessions
        type: DirectoryOrCreate
    - name: proxy-cache
      hostPath:
        path: __APME_CACHE_PATH__/proxy
        type: DirectoryOrCreate
    - name: abbenay-config
      hostPath:
        path: ${APME_ROOT}/containers/abbenay/config.yaml
        type: File