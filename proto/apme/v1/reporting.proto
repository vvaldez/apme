syntax = "proto3";

package apme.v1;

import "apme/v1/common.proto";
import "apme/v1/primary.proto";

// Reporting receives fix events from engine pods (ADR-020).
// The gateway implements this service; engine pods are gRPC clients.
service Reporting {
  rpc ReportFixCompleted(FixCompletedEvent) returns (ReportAck);

  // Rule catalog registration (ADR-041).  The authority Primary pushes
  // its full rule set on startup; the Gateway reconciles its catalog.
  rpc RegisterRules(RegisterRulesRequest) returns (RegisterRulesResponse);
}

message FixCompletedEvent {
  string scan_id = 1;
  string session_id = 2;
  string project_path = 3;
  string source = 4;
  repeated Violation remaining_violations = 5;
  ScanDiagnostics diagnostics = 6;
  ScanSummary summary = 7;
  FixReport report = 8;
  repeated ProposalOutcome proposals = 9;
  repeated ProgressUpdate logs = 10;         // pipeline milestone logs (ADR-033)
  repeated Violation fixed_violations = 11;
  repeated FilePatch patches = 12;
  ProjectManifest manifest = 13;              // dependency manifest (ADR-040)
  string content_graph_json = 14;             // JSON-serialized ContentGraph.to_dict()
}

message ProposalOutcome {
  string proposal_id = 1;
  string rule_id = 2;
  string file = 3;
  int32 tier = 4;                            // 2 or 3
  float confidence = 5;
  string status = 6;                         // "approved", "rejected", "pending"
}

message ReportAck {}

// ---------------------------------------------------------------------------
// Rule catalog registration (ADR-041)
// ---------------------------------------------------------------------------

// Metadata for a single rule, sent by Primary during registration.
message RuleDefinition {
  string rule_id = 1;
  Severity default_severity = 2;
  string category = 3;          // "lint", "modernize", "risk", "policy", "secrets"
  string source = 4;            // validator name: "native", "opa", "ansible", "gitleaks"
  string description = 5;
  RuleScope scope = 6;
  bool enabled = 7;
}

message RegisterRulesRequest {
  string pod_id = 1;            // hostname or explicit pod identifier
  bool is_authority = 2;        // only the authority Primary's registration is accepted
  repeated RuleDefinition rules = 3;
}

message RegisterRulesResponse {
  bool accepted = 1;
  string message = 2;
  int32 rules_added = 3;
  int32 rules_removed = 4;
  int32 rules_unchanged = 5;
}
