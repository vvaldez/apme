syntax = "proto3";

package apme.v1;

// RemediationClass indicates the complexity of remediating a violation.
enum RemediationClass {
  REMEDIATION_CLASS_UNSPECIFIED = 0;
  REMEDIATION_CLASS_AUTO_FIXABLE = 1;  // Tier 1: deterministic transform exists
  REMEDIATION_CLASS_AI_CANDIDATE = 2;  // Tier 2: AI can propose fix
  REMEDIATION_CLASS_MANUAL_REVIEW = 3; // Tier 3: requires human judgment
}

// RemediationResolution tracks what happened during remediation of a finding.
enum RemediationResolution {
  REMEDIATION_RESOLUTION_UNSPECIFIED = 0;
  REMEDIATION_RESOLUTION_UNRESOLVED = 1;
  REMEDIATION_RESOLUTION_TRANSFORM_FAILED = 2;
  REMEDIATION_RESOLUTION_OSCILLATION = 3;
  REMEDIATION_RESOLUTION_AI_PROPOSED = 4;
  REMEDIATION_RESOLUTION_AI_FAILED = 5;
  REMEDIATION_RESOLUTION_AI_LOW_CONFIDENCE = 6;
  REMEDIATION_RESOLUTION_USER_REJECTED = 7;
  REMEDIATION_RESOLUTION_NEEDS_CROSS_FILE = 8;
  REMEDIATION_RESOLUTION_MANUAL = 9;
}

// RuleScope indicates the structural scope at which a rule operates.
enum RuleScope {
  RULE_SCOPE_UNSPECIFIED = 0;
  RULE_SCOPE_TASK = 1;        // Individual task — AI can propose fixes
  RULE_SCOPE_BLOCK = 2;       // Block structure — AI may help
  RULE_SCOPE_PLAY = 3;        // Play header, vars, become — manual
  RULE_SCOPE_PLAYBOOK = 4;    // Multi-play structure — manual
  RULE_SCOPE_ROLE = 5;        // Role-level (meta, defaults) — manual
  RULE_SCOPE_INVENTORY = 6;   // Inventory/group_vars — manual
  RULE_SCOPE_COLLECTION = 7;  // Cross-repo scope — manual
}

// Violation is the shared shape for a single lint/policy violation.
message Violation {
  string rule_id = 1;
  string level = 2;
  string message = 3;
  string file = 4;
  oneof line_oneof {
    int32 line = 5;
    LineRange line_range = 6;
  }
  string path = 7;
  RemediationClass remediation_class = 8;
  RemediationResolution remediation_resolution = 9;
  // Rule-specific metadata (e.g. resolved_fqcn, original_module, with_key).
  // Preserves fields that transforms need but don't fit the common schema.
  map<string, string> metadata = 10;
  RuleScope scope = 11;
}

message LineRange {
  int32 start = 1;
  int32 end = 2;
}

// File represents one file in a chunked filesystem (path relative to project root, content).
message File {
  string path = 1;
  bytes content = 2;
}

// Health check (used by Primary and all validators).
message HealthRequest {}

message HealthResponse {
  string status = 1;  // "ok" or error description
  repeated ServiceHealth downstream = 2;  // Primary populates with downstream service status
}

message ServiceHealth {
  string name = 1;
  string status = 2;     // "ok" or error description
  string address = 3;
}

// Pre-computed violation counts by remediation class and resolution.
// Populated server-side so clients don't need to import counting logic.
message ScanSummary {
  int32 total = 1;
  int32 auto_fixable = 2;
  int32 ai_candidate = 3;
  int32 manual_review = 4;
  map<string, int32> by_resolution = 5;
}

// Diagnostics — always collected, displayed with -v / -vv.
message RuleTiming {
  string rule_id = 1;
  double elapsed_ms = 2;
  int32  violations = 3;
}

message ValidatorDiagnostics {
  string validator_name = 1;
  string request_id = 2;
  double total_ms = 3;
  int32  files_received = 4;
  int32  violations_found = 5;
  repeated RuleTiming rule_timings = 6;
  map<string, string> metadata = 7;
}

// Log level for structured log transport (ADR-033).
enum LogLevel {
  LOG_LEVEL_UNSPECIFIED = 0;
  DEBUG = 1;
  INFO = 2;
  WARNING = 3;
  ERROR = 4;
}

// Structured log entry transported via gRPC (ADR-033).
// Used by validators (in ValidateResponse.logs), Primary (in
// ScanResponse.logs / FormatResponse.logs), and FixSession
// (as SessionEvent.progress).
message ProgressUpdate {
  string message = 1;
  string phase = 2;       // subsystem: "primary", "native", "opa", "engine", "venv", etc.
  float progress = 3;     // 0.0-1.0, optional progress fraction
  LogLevel level = 4;
}
