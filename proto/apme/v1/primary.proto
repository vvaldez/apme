syntax = "proto3";

package apme.v1;

import "apme/v1/common.proto";
import "google/protobuf/struct.proto";

// Primary is the orchestrator daemon and sole API surface for all clients.
// Clients send file bytes in, receive processed bytes out. The Primary
// delegates internally to validators and remediation — clients never need
// to know the internal service topology.
service Primary {
  rpc Scan(ScanRequest) returns (ScanResponse);
  rpc Format(FormatRequest) returns (FormatResponse);
  rpc FormatStream(stream ScanChunk) returns (FormatResponse);
  rpc Health(HealthRequest) returns (HealthResponse);

  // Unified operation stream (ADR-028, ADR-038). Without fix_options = check mode.
  // With fix_options = remediate mode. Bidirectional stream: client sends file
  // chunks then approval commands; server streams progress, proposals, and results.
  rpc FixSession(stream SessionCommand) returns (stream SessionEvent);

  // List AI models available from the configured Abbenay daemon.
  rpc ListAIModels(ListAIModelsRequest) returns (ListAIModelsResponse);
}

// ---------------------------------------------------------------------------
// Shared messages (used by Scan, Format, and FixSession)
// ---------------------------------------------------------------------------

// ScanChunk is one batch of files for streaming RPCs (FormatStream,
// FixSession upload phase). Send metadata on the first chunk; then one or more
// chunks with files; set last=true on the final chunk.
message ScanChunk {
  string scan_id = 1;
  string project_root = 2;
  ScanOptions options = 3;      // scan/format: only used from first chunk
  repeated File files = 4;
  bool last = 5;
  FixOptions fix_options = 6;   // FixSession: only used from first chunk
}

message ScanOptions {
  bool include_scandata = 1;
  string ansible_core_version = 2;
  repeated string collection_specs = 3;
  string session_id = 4;             // client-provided session identifier for venv reuse
}

message FixOptions {
  int32 max_passes = 1;
  string ansible_core_version = 2;
  repeated string collection_specs = 3;
  repeated string exclude_patterns = 4;
  bool enable_ai = 5;
  bool enable_agentic = 6;       // Tier 3 (future)
  string ai_model = 7;
  string session_id = 8;         // client-provided session for venv reuse
}

message ScanRequest {
  string scan_id = 1;
  string project_root = 2;
  repeated File files = 3;
  ScanOptions options = 4;
  string session_id = 5;             // client-provided session for venv reuse
}

message ScanResponse {
  repeated Violation violations = 1;
  string scan_id = 2;
  bytes hierarchy_payload = 3;
  ScanDiagnostics diagnostics = 4;
  ScanSummary summary = 5;
  string session_id = 6;             // echoed back for client reuse
  repeated ProgressUpdate logs = 7;  // collected pipeline logs (ADR-033)
}

message ScanDiagnostics {
  double engine_parse_ms = 1;
  double engine_annotate_ms = 2;
  double engine_total_ms = 3;
  int32  files_scanned = 4;
  int32  trees_built = 5;
  int32  total_violations = 6;
  repeated ValidatorDiagnostics validators = 7;
  double fan_out_ms = 8;
  double total_ms = 9;
}

message FormatRequest {
  repeated File files = 1;
}

message FormatResponse {
  repeated FileDiff diffs = 1;
  repeated ProgressUpdate logs = 2;  // collected pipeline logs (ADR-033)
}

message FileDiff {
  string path = 1;
  bytes original = 2;
  bytes formatted = 3;
  string diff = 4;
}

message FilePatch {
  string path = 1;
  bytes original = 2;
  bytes patched = 3;
  string diff = 4;
  repeated string applied_rules = 5;
}

message FixReport {
  int32 passes = 1;
  int32 fixed = 2;
  int32 remaining_ai = 3;
  int32 remaining_manual = 4;
  bool oscillation_detected = 5;
  repeated Violation remaining_violations = 6;
  repeated Violation fixed_violations = 7;
}

// ---------------------------------------------------------------------------
// FixSession: bidirectional streaming (ADR-028)
// ---------------------------------------------------------------------------

// Client -> Server commands. The first N messages are ScanChunk uploads;
// after SessionCreated the client sends approval/extend/close commands.
message SessionCommand {
  oneof command {
    ScanChunk upload = 1;
    ApprovalRequest approve = 2;
    ExtendRequest extend = 3;
    CloseRequest close = 4;
    ResumeRequest resume = 5;
  }
}

message ApprovalRequest {
  repeated string approved_ids = 1;
}

message ExtendRequest {}

message CloseRequest {}

message ResumeRequest {
  string session_id = 1;
}

// Server -> Client events streamed during the fix session.
message SessionEvent {
  oneof event {
    SessionCreated created = 1;
    ProgressUpdate progress = 2;
    Tier1Summary tier1_complete = 3;
    ProposalsReady proposals = 4;
    ApprovalAck approval_ack = 5;
    SessionResult result = 6;
    ExpirationWarning expiring = 7;
    SessionClosed closed = 8;
    DataPayload data = 9;
  }
}

message SessionCreated {
  string session_id = 1;
  int32 ttl_seconds = 2;
}

// LogLevel and ProgressUpdate are defined in common.proto (ADR-033).

message Tier1Summary {
  repeated FilePatch applied_patches = 1;
  repeated FileDiff format_diffs = 2;
  bool idempotency_ok = 3;
  FixReport report = 4;
}

message Proposal {
  string id = 1;
  string file = 2;
  string rule_id = 3;
  int32 line_start = 4;
  int32 line_end = 5;
  string before_text = 6;
  string after_text = 7;
  string diff_hunk = 8;
  float confidence = 9;
  string explanation = 10;
  int32 tier = 11;
  string status = 12;       // "proposed" or "declined"
  string suggestion = 13;   // manual remediation guidance (declined only)
}

message ProposalsReady {
  repeated Proposal proposals = 1;
  int32 tier = 2;
  SessionStatus status = 3;
}

message ApprovalAck {
  int32 applied_count = 1;
  SessionStatus status = 2;
  int32 ttl_seconds = 3;
}

message SessionResult {
  repeated FilePatch patches = 1;
  FixReport report = 2;
  repeated Violation remaining_violations = 3;
  repeated Violation fixed_violations = 4;
}

message ExpirationWarning {
  int32 ttl_seconds = 1;
}

message SessionClosed {}

// Generic structured data payload. The 'kind' field tells the client what
// type of data this is; 'data' is a JSON-native Struct.
message DataPayload {
  string kind = 1;
  google.protobuf.Struct data = 2;
}

// ---------------------------------------------------------------------------
// ListAIModels
// ---------------------------------------------------------------------------

message ListAIModelsRequest {}

message AIModelInfo {
  string id = 1;
  string provider = 2;
  string name = 3;
}

message ListAIModelsResponse {
  repeated AIModelInfo models = 1;
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  AWAITING_APPROVAL = 1;
  PROCESSING = 2;
  COMPLETE = 3;
}
