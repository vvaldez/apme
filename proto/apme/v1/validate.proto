syntax = "proto3";

package apme.v1;

import "apme/v1/common.proto";

// Validator is the unified gRPC contract for all validation backends
// (native, OPA, Ansible). Every validator container implements this service.
service Validator {
  rpc Validate(ValidateRequest) returns (ValidateResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message ValidateRequest {
  string project_root = 1;
  repeated File files = 2;
  bytes hierarchy_payload = 3;    // JSON-encoded hierarchy (OPA uses this)
  bytes scandata = 4;             // serialized engine scandata (native uses this)
  string ansible_core_version = 5;
  repeated string collection_specs = 6;
  string request_id = 7;          // correlation ID propagated from Primary
  string session_id = 8;          // session identifier for venv reuse
  string venv_path = 9;           // resolved venv path (set by Primary; validators use read-only)
}

message ValidateResponse {
  repeated Violation violations = 1;
  string request_id = 2;          // echoed back for correlation
  ValidatorDiagnostics diagnostics = 3;
  repeated ProgressUpdate logs = 4;  // collected validator logs (ADR-033)
}
