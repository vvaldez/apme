---
# Role tasks with various issues
# L027: Role without metadata (no meta/main.yml)
# L024: Task without name
# L035: Unnecessary set_fact
# L039: Undefined variable

# L024: Task without name
- yum:
    name: "{{ package_name }}"
    state: present

# Task references undefined variable
- name: Use undefined variable
  ansible.builtin.debug:
    msg: "Value is {{ undefined_var }}"  # L039: undefined_var not defined

# L035: Unnecessary set_fact - just assigns existing var
- name: unnecessary set fact
  ansible.builtin.set_fact:
    new_var: "{{ existing_var }}"

# L032: Changed data dependence
- name: run command and register
  ansible.builtin.command: date
  register: date_result

- name: use changed incorrectly
  ansible.builtin.debug:
    msg: "Date changed"
  when: date_result.changed  # Command always "changes"

# Using short module name
- name: install package
  yum:  # L026: Should be ansible.builtin.yum
    name: httpd
    state: present

# L038: Unresolved role include
- name: include nonexistent role
  ansible.builtin.include_role:
    name: nonexistent_role
