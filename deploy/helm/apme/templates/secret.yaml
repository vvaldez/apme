{{- if or .Values.abbenay.enabled .Values.gateway.feedback.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "apme.fullname" . }}-secrets
  labels:
    {{- include "apme.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.abbenay.enabled }}
  abbenay-token: {{ required "abbenay.token is required when abbenay.enabled is true" .Values.abbenay.token | quote }}
  {{- if .Values.abbenay.apiKeys.openrouterApiKey }}
  openrouter-api-key: {{ .Values.abbenay.apiKeys.openrouterApiKey | quote }}
  {{- end }}
  {{- if .Values.abbenay.apiKeys.vertexAnthropicApiKey }}
  vertex-anthropic-api-key: {{ .Values.abbenay.apiKeys.vertexAnthropicApiKey | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.gateway.feedback.enabled }}
  feedback-github-token: {{ required "gateway.feedback.githubToken is required when gateway.feedback.enabled is true" .Values.gateway.feedback.githubToken | quote }}
  {{- end }}
{{- end }}
