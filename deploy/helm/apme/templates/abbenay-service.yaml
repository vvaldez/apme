{{- if .Values.abbenay.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "apme.fullname" . }}-abbenay
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: abbenay
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50057
      targetPort: 50057
      protocol: TCP
  selector:
    {{- include "apme.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: abbenay
{{- end }}
