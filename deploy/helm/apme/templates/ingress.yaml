{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "apme.fullname" . }}
  labels:
    {{- include "apme.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "gateway" }}
                name: {{ include "apme.fullname" $ }}-gateway
                port:
                  number: 8080
                {{- else if eq .service "ui" }}
                name: {{ include "apme.fullname" $ }}-ui
                port:
                  number: 8081
                {{- else }}
                {{- fail (printf "unsupported ingress path service %q: expected gateway or ui" .service) }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
