{{- if le (int .Values.engine.replicas) 1 }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "apme.fullname" . }}-sessions
  labels:
    {{- include "apme.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.sessions.accessMode }}
  {{- if .Values.persistence.sessions.storageClass }}
  storageClassName: {{ .Values.persistence.sessions.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.sessions.size }}
{{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
