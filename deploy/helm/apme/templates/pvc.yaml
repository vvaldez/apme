  labels:
    {{- include "apme.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.gateway.accessMode }}
  {{- if .Values.persistence.gateway.storageClass }}
  storageClassName: {{ .Values.persistence.gateway.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.gateway.size }}
{{- if le (int .Values.engine.replicas) 1 }}
