apiVersion: v1
kind: Service
metadata:
  name: {{ include "apme.fullname" . }}-gateway
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 50060
      targetPort: 50060
      protocol: TCP
  selector:
    {{- include "apme.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
