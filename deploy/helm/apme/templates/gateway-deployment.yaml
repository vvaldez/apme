{{- if gt (int .Values.gateway.replicas) 1 }}
{{- fail "gateway.replicas must be 1 when using SQLite (APME_DB_PATH). Use an external database for multi-replica Gateway." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "apme.fullname" . }}-gateway
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "apme.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "apme.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "apme.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: {{ include "apme.image" (dict "registry" .Values.image.registry "name" "gateway" "tag" .Values.image.tag "fallbackTag" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: APME_PRIMARY_ADDRESS
              value: "{{ include "apme.fullname" . }}-engine:50051"
            - name: APME_DB_PATH
              value: /data/apme.db
            - name: APME_GATEWAY_GRPC_LISTEN
              value: "0.0.0.0:50060"
            - name: APME_GATEWAY_HTTP_HOST
              value: "0.0.0.0"
            - name: APME_GATEWAY_HTTP_PORT
              value: "8080"
            {{- if .Values.collectionHealth.enabled }}
            - name: COLLECTION_HEALTH_GRPC_ADDRESS
              value: "{{ include "apme.fullname" . }}-engine:50058"
            {{- end }}
            {{- if .Values.depAudit.enabled }}
            - name: DEP_AUDIT_GRPC_ADDRESS
              value: "{{ include "apme.fullname" . }}-engine:50059"
            {{- end }}
            {{- if .Values.gateway.feedback.enabled }}
            - name: APME_FEEDBACK_ENABLED
              value: "true"
            - name: APME_FEEDBACK_GITHUB_REPO
              value: {{ required "gateway.feedback.githubRepo is required when gateway.feedback.enabled is true" .Values.gateway.feedback.githubRepo | quote }}
            - name: APME_FEEDBACK_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "apme.fullname" . }}-secrets
                  key: feedback-github-token
            {{- end }}
          ports:
            - name: grpc
              containerPort: 50060
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/dashboard/summary
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/dashboard/summary
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: gateway-data
              mountPath: /data
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: gateway-data
          persistentVolumeClaim:
            claimName: {{ include "apme.fullname" . }}-gateway-data
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
